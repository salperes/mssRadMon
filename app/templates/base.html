<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}mssRadMon{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css?v={{ APP_VERSION }}">
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">mssRadMon <span id="navLocation" style="font-weight:400;opacity:0.55;font-size:0.85em;"></span></div>
        <div class="nav-links">
            <a href="/" class="{% if active == 'dashboard' %}active{% endif %}">Gösterge Paneli</a>
            <a href="/admin" class="{% if active == 'admin' %}active{% endif %}">Yönetim</a>
            <span style="opacity:0.4;font-size:0.8em;">v{{ APP_VERSION }}</span>
        </div>
    </nav>
    <script>
        fetch("/api/settings").then(r=>r.ok?r.json():null).then(s=>{
            if(s&&s.device_location){document.getElementById("navLocation").textContent="— "+s.device_location;}
        }).catch(()=>{});
    </script>
    <main class="container {% block container_class %}{% endblock %}">
        {% block content %}{% endblock %}
    </main>
    {% block scripts %}{% endblock %}
</body>
</html>
